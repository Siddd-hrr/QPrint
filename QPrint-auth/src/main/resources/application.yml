server:
  port: 8081
spring:
  application:
    name: qprint-auth
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://postgres:5432/qprint}
    username: ${POSTGRES_USER:QPrint}
    password: ${POSTGRES_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: QPrint-auth
      auto-offset-reset: earliest
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        spring:
          json:
            add:
              type:
                headers: false
jwt:
  secret: ${JWT_SECRET:change-me-please-change-me-please-change-me}
  access-token-expiration-minutes: 15
  refresh-token-expiration-days: 7
app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAMESITE:Lax}
management:
  endpoints:
    web:
      exposure:
        include: health,info
